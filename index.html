<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Buğra Eren Hakkoymaz</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    text-align: center;
    padding: 30px;
    font-size: 28px;
    background: #020617;
}

nav {
    display: flex;
    justify-content: center;
    background: #1e293b;
}

nav button {
    background: none;
    border: none;
    color: white;
    padding: 15px 25px;
    cursor: pointer;
}

nav button:hover {
    background: #334155;
}

section {
    display: none;
    padding: 40px;
    text-align: center;
}

.active {
    display: block;
}
</style>

</head>
<body>

<header>
    Buğra Eren Hakkoymaz
</header>

<nav>
    <button onclick="goster('arkadas')">Arkadaşlarım</button>
    <button onclick="goster('is')">İş Hayatım</button>
    <button onclick="goster('kisisel')">Kişisel</button>
</nav>

<section id="arkadas" class="active">
    <h2>Arkadaşlarım</h2>
    <p>Buraya arkadaşlarını ekleyebilirsin 👥</p>
</section>

<section id="is">
    <h2>İş Hayatım</h2>
    <p>Projelerin ve iş deneyimlerin 💼</p>
</section>

<section id="kisisel">
    <h2>Kişisel Yaşam</h2>
    <p>Hobilerin, ilgi alanların 🎯</p>
</section>

<script>
function goster(id){
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
