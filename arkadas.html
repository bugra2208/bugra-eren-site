<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arkadaşlarım – Buğra Eren Hakkoymaz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --card: #0f1724;
    --border: #1e2d45;
    --accent: #4f8ef7;
    --accent2: #a78bfa;
    --text: #e8eaf0;
    --muted: #5a6a85;
    --success: #34d399;
    --error: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── arka plan mesh ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(79,142,247,.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(167,139,250,.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── header ── */
  header {
    position: relative;
    z-index: 10;
    padding: 24px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,12,20,.8);
    backdrop-filter: blur(12px);
  }

  header a {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: .05em;
    transition: color .2s;
  }
  header a:hover { color: var(--accent); }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-left: auto;
    letter-spacing: .03em;
  }

  /* ── main wrapper ── */
  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
  }

  /* ══════════════════════════════
     GİRİŞ EKRANI
  ══════════════════════════════ */
  #giris-ekrani {
    width: 100%;
    max-width: 420px;
    animation: fadeUp .5s ease both;
  }

  .giris-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .giris-baslik {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 8px;
  }

  .giris-alt {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 40px;
    line-height: 1.6;
  }

  .input-grup {
    margin-bottom: 16px;
  }

  .input-grup label {
    display: block;
    font-size: 12px;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .input-grup input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    letter-spacing: .12em;
    color: var(--text);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  .input-grup input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,142,247,.15);
  }

  .giris-btn {
    width: 100%;
    margin-top: 8px;
    padding: 15px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    letter-spacing: .05em;
    transition: background .2s, transform .15s, box-shadow .2s;
  }

  .giris-btn:hover {
    background: #3a7de8;
    box-shadow: 0 8px 24px rgba(79,142,247,.3);
    transform: translateY(-1px);
  }

  .giris-btn:active { transform: translateY(0); }

  .hata-mesaj {
    margin-top: 14px;
    padding: 12px 16px;
    background: rgba(248,113,113,.1);
    border: 1px solid rgba(248,113,113,.3);
    border-radius: 8px;
    color: var(--error);
    font-size: 13px;
    display: none;
    animation: shake .3s ease;
  }

  /* ══════════════════════════════
     PROFİL SAYFASI
  ══════════════════════════════ */
  #profil-ekrani {
    display: none;
    width: 100%;
    max-width: 680px;
    animation: fadeUp .5s ease both;
  }

  .profil-ust {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 36px;
  }

  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
    box-shadow: 0 8px 24px rgba(79,142,247,.25);
  }

  .profil-isim {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 6px;
  }

  .profil-no {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: .1em;
  }

  .kartlar {
    display: grid;
    gap: 16px;
  }

  .kart {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 28px;
    transition: border-color .2s;
  }

  .kart:hover { border-color: rgba(79,142,247,.3); }

  .kart-baslik {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .kart-icerik {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
  }

  .etiketler {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .etiket {
    background: rgba(79,142,247,.12);
    border: 1px solid rgba(79,142,247,.25);
    color: var(--accent);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    letter-spacing: .05em;
  }

  .cikis-btn {
    margin-top: 28px;
    padding: 10px 22px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }

  .cikis-btn:hover { border-color: var(--error); color: var(--error); }

  /* ── animasyonlar ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }
</style>
</head>
<body>

<header>
  <a href="index.html">← Ana Sayfa</a>
  <span class="header-title">Buğra Eren Hakkoymaz</span>
</header>

<main>

  <!-- GİRİŞ EKRANI -->
  <div id="giris-ekrani">
    <div class="giris-label">Arkadaşlar Portalı</div>
    <h1 class="giris-baslik">Merhaba,<br>kimsin sen?</h1>
    <p class="giris-alt">Sana verilen 8 haneli numaranı ve 4 haneli şifreni gir.</p>

    <div class="input-grup">
      <label>8 Haneli Numaran</label>
      <input type="text" id="numara-input" maxlength="8" placeholder="00000000" inputmode="numeric">
    </div>
    <div class="input-grup">
      <label>4 Haneli Şifre</label>
      <input type="password" id="sifre-input" maxlength="4" placeholder="••••" inputmode="numeric">
    </div>

    <button class="giris-btn" onclick="girisYap()">Sayfama Gir →</button>
    <div class="hata-mesaj" id="hata">Numara veya şifre hatalı. Tekrar dene.</div>
  </div>

  <!-- PROFİL EKRANI -->
  <div id="profil-ekrani">
    <div class="profil-ust">
      <div class="avatar" id="avatar-harf"></div>
      <div>
        <div class="profil-isim" id="profil-isim"></div>
        <div class="profil-no" id="profil-no"></div>
      </div>
    </div>

    <div class="kartlar">
      <div class="kart">
        <div class="kart-baslik">Hakkında</div>
        <div class="kart-icerik" id="profil-hakkinda"></div>
      </div>
      <div class="kart" id="notlar-kart">
        <div class="kart-baslik">Notlar</div>
        <div class="kart-icerik" id="profil-notlar"></div>
      </div>
      <div class="kart" id="etiketler-kart">
        <div class="kart-baslik">Etiketler</div>
        <div class="etiketler" id="profil-etiketler"></div>
      </div>
    </div>

    <button class="cikis-btn" onclick="cikisYap()">← Çıkış Yap</button>
  </div>

</main>

<script>
  let veri = null;

  // data.json'u yükle
  fetch('data.json')
    .then(r => r.json())
    .then(d => { veri = d; })
    .catch(() => { console.warn('data.json yüklenemedi'); });

  function girisYap() {
    const numara = document.getElementById('numara-input').value.trim();
    const sifre  = document.getElementById('sifre-input').value.trim();
    const hata   = document.getElementById('hata');

    if (!veri) { hata.style.display = 'block'; hata.textContent = 'Veriler yüklenemedi, sayfayı yenile.'; return; }

    const arkadas = veri.arkadaslar.find(a => a.no === numara && a.sifre === sifre);

    if (!arkadas) {
      hata.style.display = 'block';
      hata.textContent   = 'Numara veya şifre hatalı. Tekrar dene.';
      return;
    }

    hata.style.display = 'none';
    profilGoster(arkadas);
  }

  function profilGoster(a) {
    document.getElementById('avatar-harf').textContent  = a.isim[0].toUpperCase();
    document.getElementById('profil-isim').textContent  = a.isim;
    document.getElementById('profil-no').textContent    = '# ' + a.no;
    document.getElementById('profil-hakkinda').textContent = a.hakkinda;

    // Notlar
    const notlarKart = document.getElementById('notlar-kart');
    if (a.notlar) {
      document.getElementById('profil-notlar').textContent = a.notlar;
      notlarKart.style.display = 'block';
    } else {
      notlarKart.style.display = 'none';
    }

    // Etiketler
    const etiketlerKart = document.getElementById('etiketler-kart');
    const etiketlerDiv  = document.getElementById('profil-etiketler');
    if (a.etiketler && a.etiketler.length) {
      etiketlerDiv.innerHTML = a.etiketler.map(e => `<span class="etiket">${e}</span>`).join('');
      etiketlerKart.style.display = 'block';
    } else {
      etiketlerKart.style.display = 'none';
    }

    document.getElementById('giris-ekrani').style.display  = 'none';
    document.getElementById('profil-ekrani').style.display = 'block';
  }

  function cikisYap() {
    document.getElementById('numara-input').value = '';
    document.getElementById('sifre-input').value  = '';
    document.getElementById('giris-ekrani').style.display  = 'block';
    document.getElementById('profil-ekrani').style.display = 'none';
  }

  // Enter tuşu desteği
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') girisYap();
  });
</script>
</body>
</html>
